<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUSSEF ALADAWY | ELITE SYSTEM V15</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff0000; --bg: #000; --card: #111; --gold: #ffd700; --fb: #1877F2; --wa: #25D366; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        /* هيدر فخم */
        header { text-align: center; padding: 50px 20px; background: linear-gradient(180deg, #300, #000); border-bottom: 3px solid var(--main); position: relative; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--gold); color: #000; padding: 3px 10px; border-radius: 10px; font-weight: bold; font-size: 0.7rem; }

        /* التايمر المصفح ضد الغش */
        .timer-sec { background: var(--card); padding: 30px; border-radius: 30px; margin: 20px 0; border: 2px solid var(--main); text-align: center; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        #timer-val { font-size: 4.5rem; font-weight: 900; color: var(--main); font-family: monospace; display: block; margin-bottom: 10px; }
        .btn-timer { background: var(--main); color: #fff; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .btn-timer:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* كروت التمارين الذكية */
        .workout-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .coach-gif { width: 85px; height: 85px; background: #fff; border-radius: 15px; overflow: hidden; border: 2px solid var(--main); }
        .coach-gif img { width: 100%; height: 100%; object-fit: cover; }
        .ex-info { flex: 1; }
        .ex-info b { font-size: 1.1rem; color: #fff; display: block; }
        .ex-info span { color: var(--main); font-size: 0.8rem; font-weight: bold; }

        /* أزرار الدعم والفيس بوك */
        .support-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .social-btn { padding: 15px; border-radius: 15px; text-decoration: none; color: #fff; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1rem; transition: 0.3s; }
        .social-btn:active { transform: scale(0.95); }
        .fb { background: var(--fb); }
        .wa { background: var(--wa); }
        .yt { background: var(--main); width: 100%; margin-top: 10px; }

        /* رسالة الحماية */
        #cheat-alert { color: #555; font-size: 0.7rem; margin-top: 8px; display: none; }
        
        .rest-day { text-align: center; padding: 40px 10px; color: #777; }
        .rest-day i { font-size: 3rem; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="badge">PREMIUM V15</div>
        <h1 style="margin:0;">يوسف أحمد العدوي</h1>
        <p style="color:#888; margin:5px 0 0;">نظام التدريب المعتمد 🥊</p>
    </header>

    <div class="container">
        
        <div class="timer-sec">
            <small style="color:#555; letter-spacing: 2px;">REST TIMER</small>
            <span id="timer-val">00:45</span>
            <button id="timer-btn" class="btn-timer" onclick="startEliteTimer()">ابدأ الاستراحة 🔔</button>
            <p id="cheat-alert"><i class="fas fa-lock"></i> نظام الحماية مفعل.. لا يمكن التلاعب!</p>
        </div>

        <h3 style="color:var(--gold); border-bottom: 1px solid #222; padding-bottom: 10px;">
            <i class="fas fa-calendar-check"></i> خطة اليوم: <span id="day-label" style="color:#fff;"></span>
        </h3>
        
        <div id="workout-list">
            </div>

        <h3 style="margin-top: 30px;"><i class="fas fa-id-card"></i> الدعم والمتابعة</h3>
        <div class="support-grid">
            <a href="https://www.facebook.com/share/15Y9v98U7q/" target="_blank" class="social-btn fb">
                <i class="fab fa-facebook-f"></i> فيسبوك
            </a>
            <a href="https://wa.me/201551853099" target="_blank" class="social-btn wa">
                <i class="fab fa-whatsapp"></i> واتساب
            </a>
        </div>
        <a href="https://www.youtube.com/@YoussefAladawy" target="_blank" class="social-btn yt">
            <i class="fab fa-youtube"></i> شروحات الفيديو (YouTube)
        </a>

        <div style="text-align:center; margin-top:40px; color:#333; font-size:0.8rem;">
            جميع الحقوق محفوظة للكوتش يوسف العدوي © 2026
        </div>
    </div>

    <script>
        // قاعدة بيانات التمارين والجدول
        const schedule = [
            { day: "الأحد", title: "ملاكمة وتحمل 🥊", exercises: [
                { name: "كيس الملاكمة", target: "سرعة", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/vLp5U8Wq66VBC/giphy.gif" },
                { name: "ضغط سريع", target: "صدر", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKVUn7iM8FMEU24/giphy.gif" }
            ]},
            { day: "الاثنين", title: "تضخيم (حديد) 💪", exercises: [
                { name: "بنش برس", target: "صدر", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKP9p8fU1yVp1O8/giphy.gif" }
            ]},
            { day: "الثلاثاء", title: "راحة 🛌", exercises: [] },
            { day: "الأربعاء", title: "وزن جسم + جري 🏃", exercises: [
                { name: "عقلة", target: "ظهر", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/l0HlPtbHE2yT2q3q8/giphy.gif" }
            ]},
            { day: "الخميس", title: "أكتاف ورقبة 🥊", exercises: [
                { name: "تمارين رقبة", target: "قوة", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKuylS3E8f2z0iI/giphy.gif" }
            ]},
            { day: "الجمعة", title: "تمرين شامل 🔥", exercises: [
                { name: "سكوات", target: "رجلين", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKv6fSgqToTqDqU/giphy.gif" },
                { name: "بطن", target: "كور", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKMGpxfO8S7jX8A/giphy.gif" }
            ]},
            { day: "السبت", title: "راحة 🌴", exercises: [] }
        ];

        // تشغيل الجدول عند فتح الصفحة
        window.onload = () => {
            const now = new Date();
            const dayIdx = now.getDay(); // 0-6
            const today = schedule[dayIdx];
            
            document.getElementById('day-label').innerText = today.day + " - " + today.title;
            
            const list = document.getElementById('workout-list');
            if(today.exercises.length > 0) {
                today.exercises.forEach(ex => {
                    list.innerHTML += `
                        <div class="workout-card">
                            <div class="coach-gif"><img src="${ex.img}"></div>
                            <div class="ex-info">
                                <b>${ex.name}</b>
                                <span>${ex.target}</span>
                            </div>
                            <i class="fas fa-chevron-left" style="color:#333;"></i>
                        </div>`;
                });
            } else {
                list.innerHTML = `<div class="rest-day"><i class="fas fa-bed"></i> اليوم راحة سلبية.. جسمك بيتبني وأنت نايم يا بطل!</div>`;
            }
        };

        // نظام التايمر والصوت الذكي
        function startEliteTimer() {
            const btn = document.getElementById('timer-btn');
            const val = document.getElementById('timer-val');
            const alertMsg = document.getElementById('cheat-alert');
            
            let s = 45;
            btn.disabled = true; // قفل الغش
            alertMsg.style.display = 'block';

            const countdown = setInterval(() => {
                s--;
                val.innerText = `00:${s < 10 ? '0' : ''}${s}`;
                if(s <= 0) {
                    clearInterval(countdown);
                    val.innerText = "00:45";
                    btn.disabled = false;
                    alertMsg.style.display = 'none';
                    speakVictory(); // تشغيل الصوت الذكي
                }
            }, 1000);
        }

        // خاصية النطق (عاش يا بطل)
        function speakVictory() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = "عاش يا بطل.. كمل تمرينك بقوة";
            msg.lang = 'ar-SA';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
            alert("انتهى الوقت.. عاش يا وحش! 💪");
        }
    </script>
</body>
</html>
