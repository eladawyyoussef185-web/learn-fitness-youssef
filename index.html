<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learn Fitness Youssef | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff0000; --bg: #000; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* شاشة تسجيل الدخول */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .login-box { background: var(--glass); padding: 40px 20px; border-radius: 30px; border: 1px solid var(--main); width: 100%; max-width: 400px; }
        .login-box h2 { color: var(--main); margin-bottom: 20px; font-size: 1.8rem; }
        .login-box input { 
            width: 100%; padding: 15px; border-radius: 50px; border: none; 
            background: #222; color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 20px; 
        }
        .btn-enter { 
            background: var(--main); color: #fff; border: none; padding: 15px 40px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2rem; width: 100%;
        }

        /* تنسيق الصفحة الرئيسية */
        header { padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--main); background: linear-gradient(180deg, #200, #000); }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .glass-card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* التايمر */
        #timer-display { font-size: 4.5rem; font-weight: 900; color: var(--main); font-family: monospace; display: block; margin: 10px 0; }
        .btn-timer { 
            background: var(--main); color: #fff; border: none; padding: 18px; 
            border-radius: 50px; width: 100%; font-weight: bold; font-size: 1.2rem; cursor: pointer; 
        }
        .btn-timer:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* التمارين */
        .ex-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #222; }
        .ex-img { width: 70px; height: 70px; background: #fff; border-radius: 15px; overflow: hidden; border: 2px solid var(--main); }
        .ex-img img { width: 100%; height: 100%; object-fit: cover; }

        /* أزرار الدعم */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .s-btn { padding: 15px; border-radius: 15px; text-decoration: none; color: #fff; font-weight: bold; text-align: center; }
        .fb { background: #1877F2; } .wa { background: #25D366; } .yt { background: #ff0000; grid-column: span 2; margin-top: 10px; }

        .footer { text-align: center; padding: 30px; color: #555; font-size: 0.8rem; border-top: 1px solid #111; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <i class="fas fa-user-shield" style="font-size: 3rem; color: var(--main); margin-bottom: 15px;"></i>
            <h2>Learn Fitness Youssef</h2>
            <p style="color: #888; margin-bottom: 20px;">أهلاً بك في نظام النخبة، ما هو اسمك؟</p>
            <input type="text" id="user-name-input" placeholder="اكتب اسمك هنا...">
            <button class="btn-enter" onclick="enterSystem()">دخول النظام 🚀</button>
        </div>
    </div>

    <header>
        <h1 style="letter-spacing: 1px; font-size: 1.8rem;">LEARN FITNESS YOUSSEF</h1>
        <p id="welcome-user" style="color: var(--gold); font-weight: bold; margin-top: 10px;"></p>
    </header>

    <div class="container">
        <div class="glass-card" style="text-align: center;">
            <small style="color: #777;">REST TIMER</small>
            <span id="timer-display">00:45</span>
            <button id="timer-btn" class="btn-timer" onclick="startTimer()">ابدأ الاستراحة 🔔</button>
            <p id="cheat-msg" style="display:none; font-size: 0.7rem; color: #555; margin-top: 10px;">نظام الحماية مفعل.. لا يمكن التلاعب!</p>
        </div>

        <h3 style="margin-bottom: 15px;"><i class="fas fa-dumbbell" style="color: var(--main);"></i> تمرينك اليوم</h3>
        <div class="glass-card" id="workout-list">
            </div>

        <h3><i class="fas fa-headset" style="color: var(--main);"></i> الدعم والمتابعة</h3>
        <div class="social-grid">
            <a href="https://www.facebook.com/share/15Y9v98U7q/" target="_blank" class="s-btn fb"><i class="fab fa-facebook-f"></i> فيسبوك</a>
            <a href="https://wa.me/201551853099" target="_blank" class="s-btn wa"><i class="fab fa-whatsapp"></i> واتساب</a>
            <a href="https://www.youtube.com/@YoussefAladawy" target="_blank" class="s-btn yt"><i class="fab fa-youtube"></i> قناة اليوتيوب</a>
        </div>

        <div class="footer">
            تطوير يوسف أحمد العدوي وعمر عبدالله © 2026<br>
            LEARN-FITNESS-YOUSSEF | V17.0
        </div>
    </div>

    <script>
        // نظام الدخول
        function enterSystem() {
            const name = document.getElementById('user-name-input').value;
            if (name.trim() !== "") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('welcome-user').innerText = "أهلاً بك يا بطل: " + name;
                // نطق الترحيب
                const speak = new SpeechSynthesisUtterance("أهلاً بك يا بطل " + name + " في نظام يوسف العدوي");
                speak.lang = 'ar-SA';
                window.speechSynthesis.speak(speak);
            } else {
                alert("من فضلك اكتب اسمك أولاً!");
            }
        }

        // قاعدة بيانات التمارين
        const schedule = [
            { day: "الأحد", exercises: [{name: "ملاكمة", target: "سرعة", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/vLp5U8Wq66VBC/giphy.gif"}] },
            { day: "الاثنين", exercises: [{name: "حديد", target: "صدر", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKP9p8fU1yVp1O8/giphy.gif"}] },
            { day: "الثلاثاء", exercises: [] },
            { day: "الأربعاء", exercises: [{name: "عقلة", target: "ظهر", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/l0HlPtbHE2yT2q3q8/giphy.gif"}] },
            { day: "الخميس", exercises: [{name: "رقبة", target: "تحمل", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKuylS3E8f2z0iI/giphy.gif"}] },
            { day: "الجمعة", exercises: [{name: "سكوات", target: "أرجل", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKv6fSgqToTqDqU/giphy.gif"}] },
            { day: "السبت", exercises: [] }
        ];

        window.onload = () => {
            const dayIdx = new Date().getDay();
            const today = schedule[dayIdx];
            const list = document.getElementById('workout-list');
            if(today.exercises.length > 0) {
                today.exercises.forEach(ex => {
                    list.innerHTML += `<div class="ex-item"><div class="ex-img"><img src="${ex.img}"></div><div class="ex-info"><b>${ex.name}</b><span>${ex.target}</span></div></div>`;
                });
            } else {
                list.innerHTML = `<p style="text-align:center; color:#555;">اليوم راحة يا بطل! 🛌</p>`;
            }
        };

        function startTimer() {
            const btn = document.getElementById('timer-btn');
            const display = document.getElementById('timer-display');
            let s = 45;
            btn.disabled = true;
            document.getElementById('cheat-msg').style.display = 'block';

            const count = setInterval(() => {
                s--;
                display.innerText = `00:${s < 10 ? '0' : ''}${s}`;
                if(s <= 0) {
                    clearInterval(count);
                    display.innerText = "00:45";
                    btn.disabled = false;
                    document.getElementById('cheat-msg').style.display = 'none';
                    // نطق "عاش يا بطل"
                    const speak = new SpeechSynthesisUtterance("عاش يا بطل.. كمل تمرينك بقوة");
                    speak.lang = 'ar-SA';
                    window.speechSynthesis.speak(speak);
                    alert("عاش يا وحش! 💪");
                }
            }, 1000);
        }
    </script>
</body>
</html>
