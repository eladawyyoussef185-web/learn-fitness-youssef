<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Fitness Youssef | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #e60000; --bg: #0a0a0a; --card: #151515; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* إشعار ذكر الله */
        #dhikr-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--main); border-radius: 30px;
            padding: 15px 30px; color: #fff; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 20px rgba(230,0,0,0.4); z-index: 9999; transition: 0.5s ease;
            display: flex; align-items: center; gap: 10px;
        }
        #dhikr-toast.show { top: 20px; }

        /* الهيدر وزر المشاركة */
        header { padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--main); background: #000; position: relative; }
        header h1 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }
        .share-btn {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--main); color: #fff;
            width: 45px; height: 45px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 1.2rem;
        }
        .share-btn:hover { background: var(--main); }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* شاشة التسجيل */
        #auth-section { display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        .auth-box { background: var(--card); padding: 40px 30px; border-radius: 20px; border: 1px solid #333; width: 100%; text-align: center; }
        .auth-box input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none; background: #222; color: #fff; font-size: 1rem; }
        .auth-box input:focus { outline: 1px solid var(--main); }
        .btn { background: var(--main); color: #fff; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #cc0000; }

        /* شاشة التمارين والفيديوهات */
        #workout-section { display: none; }
        .workout-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .video-container { width: 100%; height: 200px; border-radius: 10px; overflow: hidden; border: 2px solid var(--main); margin-bottom: 15px; background: #000; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        .ex-details h3 { margin-bottom: 5px; color: var(--main); }
        .ex-details p { font-size: 0.9rem; color: #aaa; line-height: 1.5; }

        /* شاشة الأدمن */
        #admin-section { display: none; }
        .admin-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--main); }
        .user-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; align-items: center;}
        .user-row:last-child { border-bottom: none; }
        .btn-clear { background: #555; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 15px;}
        
        .footer { text-align: center; margin-top: 40px; padding: 20px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- إشعار ذكر الله الذكي -->
    <div id="dhikr-toast">
        <i class="fas fa-moon" style="color: gold;"></i> <span id="dhikr-text">سبحان الله وبحمده</span>
    </div>

    <header>
        <!-- أيقونة المشاركة -->
        <button class="share-btn" onclick="shareWebsite()" title="مشاركة الموقع">
            <i class="fas fa-share-alt"></i>
        </button>
        <h1>Learn Fitness Youssef</h1>
        <p style="color: #888; font-size: 0.9rem; margin-top: 5px;">نظام التدريب المعتمد</p>
    </header>

    <div class="container">
        <!-- قسم 1: التسجيل الدخول -->
        <div id="auth-section">
            <div class="auth-box">
                <i class="fas fa-user-circle" style="font-size: 4rem; color: var(--main); margin-bottom: 20px;"></i>
                <h2 style="margin-bottom: 20px;">تسجيل الدخول للنظام</h2>
                <input type="text" id="user-name" placeholder="الاسم بالكامل" required>
                <input type="email" id="user-email" placeholder="البريد الإلكتروني (الجيميل)" required>
                <button class="btn" onclick="loginSystem()">دخول التمارين 🚀</button>
            </div>
        </div>

        <!-- قسم 2: جدول التمارين بالفيديوهات -->
        <div id="workout-section">
            <h2 style="text-align: center; margin-bottom: 20px; color: var(--main);">جدول تمرين اليوم</h2>
            <div id="exercises-container">
                <!-- التمارين هتظهر هنا -->
            </div>
        </div>

        <!-- قسم 3: لوحة تحكم الأدمن -->
        <div id="admin-section">
            <h2 style="text-align: center; margin-bottom: 20px; color: #0f0;"><i class="fas fa-shield-alt"></i> لوحة الإدارة</h2>
            <div class="admin-box">
                <h3 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">قائمة المشتركين المسجلين:</h3>
                <div id="users-list">
                    <!-- أسماء المشتركين هتظهر هنا -->
                </div>
                <button class="btn-clear" onclick="clearUsers()">مسح بيانات المشتركين 🗑️</button>
            </div>
        </div>

        <!-- الحقوق باسمك فقط -->
        <div class="footer">
            جميع الحقوق محفوظة - تطوير وإدارة يوسف أحمد العدوي © 2026<br>
            LEARN-FITNESS-YOUSSEF
        </div>
    </div>

    <script>
        // مشاركة الموقع
        function shareWebsite() {
            if (navigator.share) {
                navigator.share({
                    title: 'Learn Fitness Youssef',
                    text: 'انضم لنظام التدريب الاحترافي مع الكوتش يوسف العدوي 🥊',
                    url: window.location.href
                }).catch(console.error);
            } else {
                alert("انسخ الرابط وابعته لأصحابك: " + window.location.href);
            }
        }

        // نظام إشعارات ذكر الله
        const athkar = ["سبحان الله وبحمده", "استغفر الله العظيم", "اللهم صلِ على محمد", "لا إله إلا الله", "الحمد لله دائماً وأبداً"];
        function showDhikr() {
            const toast = document.getElementById('dhikr-toast');
            const randomZikr = athkar[Math.floor(Math.random() * athkar.length)];
            document.getElementById('dhikr-text').innerText = randomZikr + " .. اذكر الله";
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000); 
        }
        setInterval(showDhikr, 45000); // كل 45 ثانية

        // قاعدة بيانات التمارين (بفيديوهات يوتيوب موثوقة)
        const dailyWorkouts = [
            {
                title: "تمرين الضغط (Push-ups)",
                desc: "حافظ على استقامة ظهرك، وانزل بجسمك لحد ما صدرك يلمس الأرض تقريباً. (3 مجاميع x 12 عدة)",
                video: "https://www.youtube.com/embed/IODxDxX7oi4?autoplay=1&mute=1&loop=1&playlist=IODxDxX7oi4"
            },
            {
                title: "تمرين السكوات (Squats)",
                desc: "افتح رجلك بعرض كتافك، وانزل كأنك بتقعد على كرسي. (4 مجاميع x 15 عدة)",
                video: "https://www.youtube.com/embed/xqvCmoLPNdo?autoplay=1&mute=1&loop=1&playlist=xqvCmoLPNdo"
            },
            {
                title: "تمرين العقلة (Pull-ups)",
                desc: "امسك البار واطلع لحد ما دقنك تعدي البار، وانزل ببطء عشان تفعل عضلات الظهر. (3 مجاميع x أقصى عدد)",
                video: "https://www.youtube.com/embed/eGo4IYtlbpU?autoplay=1&mute=1&loop=1&playlist=eGo4IYtlbpU"
            }
        ];

        // نظام التسجيل ودخول الأدمن
        function loginSystem() {
            const name = document.getElementById('user-name').value.trim();
            const email = document.getElementById('user-email').value.trim();

            if(name === "" || email === "") {
                alert("يا بطل لازم تكتب اسمك وجيميلك الأول!");
                return;
            }

            document.getElementById('auth-section').style.display = 'none';

            // لوحة الأدمن
            if(email.toLowerCase() === "youssef@admin.com") {
                document.getElementById('admin-section').style.display = 'block';
                showAdminDashboard();
                alert("أهلاً بك يا كوتش يوسف في لوحة الإدارة 👑");
            } else {
                saveUser(name, email);
                document.getElementById('workout-section').style.display = 'block';
                loadWorkouts();
                alert("عاش يا " + name + "! تم تسجيلك بنجاح 🥊");
            }
        }

        // تخزين وعرض البيانات بإصلاح المشكلة
        function saveUser(name, email) {
            let users = JSON.parse(localStorage.getItem('youssef_members') || "[]");
            // التأكد إن الإيميل مش متسجل قبل كده عشان ميكررش الأسماء
            const exists = users.find(u => u.email === email);
            if(!exists) {
                users.push({ name: name, email: email, date: new Date().toLocaleDateString('ar-EG') });
                localStorage.setItem('youssef_members', JSON.stringify(users));
            }
        }

        function loadWorkouts() {
            const container = document.getElementById('exercises-container');
            dailyWorkouts.forEach(ex => {
                container.innerHTML += `
                    <div class="workout-card">
                        <div class="video-container">
                            <iframe src="${ex.video}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                        <div class="ex-details">
                            <h3>${ex.title}</h3>
                            <p>${ex.desc}</p>
                        </div>
                    </div>
                `;
            });
        }

        function showAdminDashboard() {
            const list = document.getElementById('users-list');
            let users = JSON.parse(localStorage.getItem('youssef_members') || "[]");
            
            if(users.length === 0) {
                list.innerHTML = "<p style='color:#888; text-align:center;'>لا يوجد مشتركون مسجلون على هذا الجهاز.</p>";
                return;
            }

            list.innerHTML = "";
            users.forEach(user => {
                list.innerHTML += `
                    <div class="user-row">
                        <div><strong style="color:var(--main);">${user.name}</strong> <br> <small style="color:#aaa;">${user.email}</small></div>
                        <div style="color:#777; font-size:0.8rem;">${user.date}</div>
                    </div>
                `;
            });
        }

        function clearUsers() {
            if(confirm("متأكد إنك عايز تمسح كل المشتركين من الجهاز ده؟")) {
                localStorage.removeItem('youssef_members');
                showAdminDashboard();
            }
        }
    </script>
</body>
</html>
