<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUSSEF FITNESS | LIVE COACH V7</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pro-red: #ff0000; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        header { background: linear-gradient(180deg, #000, #300); padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--pro-red); }
        h1 { margin: 0; font-size: 2rem; text-shadow: 0 0 10px var(--pro-red); }

        /* كروت التمارين الاحترافية */
        .ex-card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 25px; 
            margin: 20px 0; 
            border: 1px solid #222; 
            display: flex; 
            align-items: center; 
            gap: 20px;
            transition: 0.3s;
        }

        /* --- أنيميشن المدرب الآلي (الضغط) --- */
        .coach-icon {
            width: 70px;
            height: 70px;
            background: #222;
            border-radius: 15px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--pro-red);
        }

        /* رسمة شخصية بتعمل ضغط بالـ CSS */
        .pushup-man {
            width: 40px;
            height: 10px;
            background: var(--pro-red);
            border-radius: 5px;
            position: relative;
            animation: pushup-anim 1.5s infinite ease-in-out;
        }
        .pushup-man::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            top: -15px;
            left: 30px;
        }
        @keyframes pushup-anim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(15px); }
        }

        /* رسمة شخصية بتعمل عقبة/رقبة */
        .neck-man {
            width: 10px;
            height: 30px;
            background: var(--pro-red);
            animation: neck-anim 1s infinite;
        }
        @keyframes neck-anim {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        .ex-info { flex: 1; }
        .ex-info b { font-size: 1.2rem; display: block; }
        .ex-info span { color: #777; font-size: 0.9rem; }

        .btn-play { color: var(--pro-red); font-size: 1.8rem; text-decoration: none; }
        
        /* نظام التايمر */
        .timer-box { background: #1a1a1a; padding: 25px; border-radius: 30px; text-align: center; margin: 20px 0; border: 2px solid var(--pro-red); }
        #time { font-size: 3.5rem; font-weight: 900; color: var(--pro-red); margin-bottom: 10px; }
        .btn-rest { background: var(--pro-red); color: #fff; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; }

        /* الدعم الفني */
        .support { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-top: 30px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <h1>YOUSSEF FITNESS PRO</h1>
        <p style="color:var(--pro-red);">مدربك الشخصي الذكي</p>
    </header>

    <div class="container">
        
        <div class="timer-box">
            <div id="time">00:45</div>
            <button class="btn-rest" onclick="startTimer()">ابدأ الراحة 🔔</button>
        </div>

        <h3 style="border-right: 4px solid var(--pro-red); padding-right: 10px;">التمارين التعليمية</h3>

        <div class="ex-card">
            <div class="coach-icon">
                <div class="pushup-man"></div>
            </div>
            <div class="ex-info">
                <b>تمرين الضغط</b>
                <span>صدر + أكتاف + تراي</span>
            </div>
            <a href="https://www.youtube.com/watch?v=IODxDxX7oi4" target="_blank" class="btn-play"><i class="fab fa-youtube"></i></a>
        </div>

        <div class="ex-card">
            <div class="coach-icon">
                <div class="neck-man"></div>
            </div>
            <div class="ex-info">
                <b>تمارين الرقبة</b>
                <span>ستايل مايك تايسون</span>
            </div>
            <a href="https://www.youtube.com/watch?v=uD9lUvE83rU" target="_blank" class="btn-play"><i class="fab fa-youtube"></i></a>
        </div>

        <div class="support">
            <h4 style="margin:0 0 10px;"><i class="fab fa-whatsapp" style="color:#25d366;"></i> الدعم الفني للكوتش يوسف</h4>
            <textarea id="msg" placeholder="اكتب سؤالك هنا..."></textarea>
            <button class="btn-rest" style="background:#25d366;" onclick="send()">إرسال واتساب 🚀</button>
        </div>

        <div style="text-align:center; padding:30px; color:#444; font-size:0.8rem;">
            تطوير يوسف أحمد العدوي © 2026
        </div>
    </div>

    <script>
        function startTimer() {
            let s = 45;
            const d = document.getElementById('time');
            const t = setInterval(() => {
                s--;
                d.innerText = `00:${s < 10 ? '0' : ''}${s}`;
                if(s <= 0) { clearInterval(t); alert("انتهى الوقت! 💪"); d.innerText="00:45"; }
            }, 1000);
        }

        function send() {
            const m = document.getElementById('msg').value;
            if(m) {
                window.open(`https://wa.me/201551853099?text=سؤال من التطبيق: ${m}`, '_blank');
            }
        }
    </script>
</body>
</html>
