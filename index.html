<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learn Fitness Youssef | Elite System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff0000; --bg: #000; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; }

        /* شاشة دخول الأدمن */
        #admin-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20000; display: flex; justify-content: center; align-items: center;
        }
        .login-card { 
            background: var(--glass); padding: 40px 30px; border-radius: 30px; 
            border: 2px solid var(--main); width: 90%; max-width: 400px; text-align: center;
        }
        .login-card input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; 
            background: #111; color: #fff; margin-bottom: 15px; text-align: center;
        }
        .btn-login { 
            background: var(--main); color: #fff; border: none; padding: 15px; 
            border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer;
        }

        /* محتوى الويب سايت */
        #main-content { display: none; }
        header { 
            padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--main); 
            background: linear-gradient(180deg, #200, #000); position: relative;
        }
        
        /* أيقونة الشير الجديدة */
        .share-btn {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            background: var(--glass); border: 1px solid var(--main); color: #fff;
            width: 45px; height: 45px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .share-btn:active { background: var(--main); }

        .container { max-width: 500px; margin: auto; padding: 15px; }
        .glass-card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center;}
        
        #timer-val { font-size: 4rem; font-weight: 900; color: var(--main); display: block; margin: 10px 0; font-family: monospace; }
        .btn-action { background: var(--main); color: #fff; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .footer { text-align: center; padding: 30px; color: #444; font-size: 0.8rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="admin-login">
        <div class="login-card">
            <i class="fas fa-user-shield" style="font-size: 3.5rem; color: var(--main); margin-bottom: 15px;"></i>
            <h2>ADMIN LOGIN</h2>
            <input type="text" id="user" placeholder="اسم المستخدم (Admin)">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn-login" onclick="checkAuth()">دخول النظام 🔐</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div class="share-btn" onclick="shareWebsite()" title="مشاركة الموقع">
                <i class="fas fa-share-alt"></i>
            </div>
            <h1 style="text-transform: uppercase; font-size: 1.4rem;">Learn Fitness Youssef</h1>
            <p style="color: var(--gold); font-size: 0.8rem;">بواسطة يوسف العدوي & عمر عبدالله</p>
        </header>

        <div class="container">
            <div class="glass-card">
                <small style="color: #666;">REST TIMER</small>
                <span id="timer-val">00:45</span>
                <button id="t-btn" class="btn-action" onclick="startTimer()">ابدأ وقت الراحة 🔔</button>
            </div>

            <div class="glass-card" style="border-color: #25d366;">
                <h3 style="margin-bottom: 15px;">دعم المشتركين</h3>
                <button class="btn-action" style="background:#25d366;" onclick="window.open('https://wa.me/201551853099')">
                    <i class="fab fa-whatsapp"></i> واتساب الإدارة
                </button>
            </div>

            <div class="footer">
                تطوير يوسف أحمد العدوي وعمر عبدالله © 2026<br>
                LEARN-FITNESS-YOUSSEF | V19
            </div>
        </div>
    </div>

    <script>
        // نظام التحقق
        function checkAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === "Youssef" && p === "12345") {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                const msg = new SpeechSynthesisUtterance("أهلاً بك يا كوتش يوسف");
                msg.lang = 'ar-SA';
                window.speechSynthesis.speak(msg);
            } else {
                alert("بيانات الدخول خاطئة!");
            }
        }

        // وظيفة مشاركة الموقع
        function shareWebsite() {
            if (navigator.share) {
                navigator.share({
                    title: 'Learn Fitness Youssef',
                    text: 'انضم لأقوى نظام تدريبي مع الكوتش يوسف العدوي 🥊',
                    url: window.location.href
                }).then(() => console.log('تمت المشاركة بنجاح'))
                  .catch((error) => console.log('خطأ في المشاركة', error));
            } else {
                // لو المتصفح مش بيدعم الشير المباشر (زي بعض نسخ الكمبيوتر)
                alert("انسخ الرابط وابعته لأصحابك: " + window.location.href);
            }
        }

        // التايمر
        function startTimer() {
            const btn = document.getElementById('t-btn');
            const val = document.getElementById('timer-val');
            let s = 45;
            btn.disabled = true;
            const count = setInterval(() => {
                s--;
                val.innerText = `00:${s < 10 ? '0' : ''}${s}`;
                if(s <= 0) {
                    clearInterval(count);
                    val.innerText = "00:45";
                    btn.disabled = false;
                    const speak = new SpeechSynthesisUtterance("عاش يا وحش.. كمل تمرينك");
                    speak.lang = 'ar-SA';
                    window.speechSynthesis.speak(speak);
                }
            }, 1000);
        }
    </script>
</body>
</html>
