<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUSSEF FITNESS | AI VOICE V14</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff0000; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        
        header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #300, #000); border-bottom: 3px solid var(--main); }
        .day-badge { background: var(--main); color: #fff; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* كروت التمارين */
        .workout-box { background: var(--card); border-radius: 25px; padding: 20px; margin: 20px 0; border: 1px solid #333; }
        .ex-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #222; }
        
        .coach-img { width: 80px; height: 80px; background: #fff; border-radius: 15px; overflow: hidden; border: 2px solid var(--main); }
        .coach-img img { width: 100%; height: 100%; object-fit: cover; }

        .ex-info { flex: 1; }
        .ex-info b { font-size: 1.1rem; display: block; }
        .ex-info span { color: var(--main); font-size: 0.8rem; font-weight: bold; }

        /* التايمر المحترف */
        .timer-sec { text-align: center; background: #1a1a1a; padding: 25px; border-radius: 30px; margin: 20px 0; border: 2px solid var(--main); }
        #timer-val { font-size: 4rem; font-weight: 900; color: var(--main); font-family: monospace; }
        .btn-go { background: var(--main); color: #fff; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: 900; cursor: pointer; font-size: 1.2rem; }
        .btn-go:disabled { background: #333; color: #666; cursor: not-allowed; }

        .active-day { background: rgba(255,0,0,0.2) !important; font-weight: bold; border-right: 5px solid var(--main); }
    </style>
</head>
<body>

    <header>
        <div id="current-day" class="day-badge">جاري التحميل...</div>
        <h1 style="margin: 10px 0;">يوسف العدوي PRO</h1>
        <p id="today-title" style="color: #888;"></p>
    </header>

    <div class="container">
        
        <div id="workout-list" class="workout-box">
            </div>

        <div class="timer-sec">
            <small>وقت الراحة</small>
            <div id="timer-val">00:45</div>
            <button id="timer-btn" class="btn-go" onclick="startProTimer()">ابدأ الاستراحة 🔔</button>
        </div>

        <div class="workout-box" style="border-color: #25d366; text-align: center;">
            <button class="btn-go" style="background:#25d366;" onclick="window.open('https://wa.me/201551853099')">تواصل واتساب 🚀</button>
        </div>

    </div>

    <script>
        const schedule = [
            { day: "الأحد", title: "ملاكمة وتحمل 🥊", exercises: [
                { name: "كيس الملاكمة", target: "سرعة", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/vLp5U8Wq66VBC/giphy.gif" },
                { name: "ضغط سريع", target: "صدر", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKVUn7iM8FMEU24/giphy.gif" }
            ]},
            { day: "الاثنين", title: "تضخيم حديد 💪", exercises: [
                { name: "بنش برس", target: "صدر", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKP9p8fU1yVp1O8/giphy.gif" }
            ]},
            { day: "الثلاثاء", title: "راحة 🛌", exercises: [] },
            { day: "الأربعاء", title: "وزن الجسم وجري 🏃", exercises: [
                { name: "عقلة", target: "ظهر", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/l0HlPtbHE2yT2q3q8/giphy.gif" }
            ]},
            { day: "الخميس", title: "أكتاف ورقبة 🥊", exercises: [
                { name: "تمارين رقبة", target: "قوة", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKuylS3E8f2z0iI/giphy.gif" }
            ]},
            { day: "الجمعة", title: "تمرين شامل 🔥", exercises: [
                { name: "سكوات", target: "رجلين", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKv6fSgqToTqDqU/giphy.gif" },
                { name: "بطن", target: "كور", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5amRieWd4ZHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKMGpxfO8S7jX8A/giphy.gif" }
            ]},
            { day: "السبت", title: "راحة 🌴", exercises: [] }
        ];

        window.onload = () => {
            const dayIdx = new Date().getDay();
            const today = schedule[dayIdx];
            document.getElementById('current-day').innerText = today.day;
            document.getElementById('today-title').innerText = today.title;
            const list = document.getElementById('workout-list');
            if(today.exercises.length > 0) {
                today.exercises.forEach(ex => {
                    list.innerHTML += `<div class="ex-item"><div class="coach-img"><img src="${ex.img}"></div><div class="ex-info"><b>${ex.name}</b><span>${ex.target}</span></div></div>`;
                });
            } else {
                list.innerHTML = `<div style="text-align:center; padding:20px;"><h3>استراحة محارب! 🛌</h3></div>`;
            }
        };

        function startProTimer() {
            const btn = document.getElementById('timer-btn');
            const val = document.getElementById('timer-val');
            let s = 45;
            btn.disabled = true;

            const timer = setInterval(() => {
                s--;
                val.innerText = `00:${s < 10 ? '0' : ''}${s}`;
                if(s <= 0) {
                    clearInterval(timer);
                    val.innerText = "00:45";
                    btn.disabled = false;
                    speakCoach(); // نداء الصوت الذكي
                }
            }, 1000);
        }

        function speakCoach() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = "عاش يا بطل.. كمل تمرينك بقوة";
            msg.lang = 'ar-SA'; // لغة عربية
            msg.rate = 0.9;      // سرعة الصوت
            window.speechSynthesis.speak(msg);
            alert("عاش يا وحش! 💪");
        }
    </script>
</body>
</html>
