<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUSSEF ELADAWY | ELITE COACH V8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pro-red: #ff0000; --dark-bg: #000; --card: #111; --gold: #ffd700; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        header { background: linear-gradient(180deg, #000, #300); padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--pro-red); box-shadow: 0 5px 20px rgba(255,0,0,0.3); }
        h1 { margin: 0; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; }

        /* --- كارت التمرين المحترف --- */
        .ex-card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 30px; 
            margin: 25px 0; 
            border: 1px solid #222; 
            display: flex; 
            align-items: center; 
            gap: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .ex-card:hover { border-color: var(--pro-red); transform: translateY(-5px); }

        /* --- أنميشن الشخصية الرياضية (SVG) --- */
        .coach-box {
            width: 90px;
            height: 90px;
            background: #1a1a1a;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #333;
        }

        /* أنميشن الضغط */
        .pushup-svg { width: 70px; height: 50px; fill: var(--pro-red); animation: pushup-move 1.5s infinite ease-in-out; }
        @keyframes pushup-move {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(20px) rotate(-5deg); }
        }

        /* أنميشن الرقبة / البطن */
        .situp-svg { width: 50px; height: 70px; fill: var(--gold); animation: situp-move 1.2s infinite ease-in-out; transform-origin: bottom; }
        @keyframes situp-move {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(40deg); }
        }

        .ex-info { flex: 1; }
        .ex-info b { font-size: 1.3rem; color: #fff; display: block; margin-bottom: 5px; }
        .ex-info span { color: var(--pro-red); font-size: 0.85rem; font-weight: bold; }

        .yt-btn { color: #fff; background: #c00; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 1.2rem; box-shadow: 0 0 10px rgba(204,0,0,0.5); }

        /* --- التايمر والدعم --- */
        .timer-box { background: linear-gradient(145deg, #111, #222); padding: 30px; border-radius: 35px; text-align: center; margin: 30px 0; border: 2px solid var(--pro-red); }
        #timer-text { font-size: 4rem; font-weight: 900; color: var(--pro-red); font-family: 'Courier New', Courier, monospace; }
        
        .action-btn { background: var(--pro-red); color: #fff; border: none; padding: 18px; border-radius: 50px; width: 100%; font-size: 1.2rem; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .action-btn:active { transform: scale(0.95); }

        #admin-sec { display: none; background: #200; padding: 20px; border-radius: 20px; border: 2px solid var(--pro-red); margin-top: 20px; }
        
        input, textarea { width: 100%; padding: 15px; border-radius: 15px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <h1 id="user-title">يوسف العدوي</h1>
        <p style="color:var(--pro-red); font-weight:bold;">PREMIUM AI COACHING</p>
    </header>

    <div class="container">
        
        <div class="timer-box">
            <small style="color:#666;">REST TIME</small>
            <div id="timer-text">00:45</div>
            <button class="action-btn" onclick="startTimer()">ابدأ وقت الراحة 🔔</button>
        </div>

        <h3 style="border-right: 5px solid var(--pro-red); padding-right: 12px; margin: 30px 0 15px;">التمارين والتعليم المباشر 🥋</h3>

        <div class="ex-card">
            <div class="coach-box">
                <svg class="pushup-svg" viewBox="0 0 100 60">
                    <circle cx="85" cy="15" r="8"/> <rect x="10" y="25" width="70" height="10" rx="5"/> <line x1="20" y1="35" x2="20" y2="55" stroke="white" stroke-width="5" stroke-linecap="round"/> <line x1="60" y1="35" x2="60" y2="55" stroke="white" stroke-width="5" stroke-linecap="round"/> </svg>
            </div>
            <div class="ex-info">
                <b>تمرين الضغط</b>
                <span>صدر + تراي + قوة</span>
            </div>
            <a href="https://www.youtube.com/watch?v=IODxDxX7oi4" target="_blank" class="yt-btn"><i class="fab fa-youtube"></i></a>
        </div>

        <div class="ex-card">
            <div class="coach-box">
                <svg class="situp-svg" viewBox="0 0 60 100">
                    <circle cx="30" cy="15" r="10"/> <rect x="25" y="30" width="10" height="50" rx="5"/> <path d="M10 80 Q 30 80 50 80" stroke="white" stroke-width="8" stroke-linecap="round"/> </svg>
            </div>
            <div class="ex-info">
                <b>تمارين الرقبة</b>
                <span>مرونة + قوة جبارة</span>
            </div>
            <a href="https://www.youtube.com/watch?v=uD9lUvE83rU" target="_blank" class="yt-btn"><i class="fab fa-youtube"></i></a>
        </div>

        <div class="timer-box" style="border-color:#25d366; background:#050505;">
            <h4 style="margin:0 0 15px;"><i class="fab fa-whatsapp" style="color:#25d366;"></i> الدعم الفني المباشر</h4>
            <input type="text" id="u-name" placeholder="اسمك يا بطل">
            <textarea id="u-msg" placeholder="اسأل الكوتش يوسف..."></textarea>
            <button class="action-btn" style="background:#25d366;" onclick="sendWA()">إرسال واتساب 🚀</button>
            
            <div id="admin-sec">
                <b style="color:var(--pro-red);">ADMIN PANEL | يوسف العدوي</b><br>
                <small>أهلاً بك في لوحة التحكم الخاصة بك.</small>
            </div>
        </div>

        <div style="text-align:center; padding:30px; color:#444; font-size:0.8rem; border-top:1px solid #222;">
            تطوير يوسف أحمد العدوي © 2026<br>
            <a href="https://www.facebook.com/jou.eladawy/" target="_blank" style="color:#1877f2; text-decoration:none;">Facebook Profile</a>
        </div>
    </div>

    <script>
        // التحقق من الاسم وتفعيل الإدمن
        window.onload = () => {
            const name = prompt("مرحباً بك! ادخل اسمك:") || "بطل";
            document.getElementById('user-title').innerText = "كوتش " + name;
            if(name.toLowerCase() === 'admin_youssef') {
                document.getElementById('admin-sec').style.display = 'block';
                alert("مرحباً يا يوسف! تم تفعيل لوحة الإدمن 🔥");
            }
        };

        function startTimer() {
            let s = 45;
            const d = document.getElementById('timer-text');
            const btn = document.querySelector('.action-btn');
            btn.disabled = true;
            const t = setInterval(() => {
                s--;
                d.innerText = `00:${s < 10 ? '0' : ''}${s}`;
                if(s <= 0) {
                    clearInterval(t);
                    alert("انتهى الوقت! يللا يا وحش 💪");
                    d.innerText = "00:45";
                    btn.disabled = false;
                }
            }, 1000);
        }

        function sendWA() {
            const name = document.getElementById('u-name').value;
            const msg = document.getElementById('u-msg').value;
            if(name && msg) {
                window.open(`https://wa.me/201551853099?text=الاسم: ${name}%0Aالسؤال: ${msg}`, '_blank');
            } else { alert("اكتب اسمك وسؤالك الأول!"); }
        }
    </script>
</body>
</html>
